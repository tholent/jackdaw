# Alembic config for development use (autogenerate / manual `alembic` CLI runs).
#
# At runtime the application does NOT read this file: jackdaw.db.engine builds an
# Alembic Config programmatically and runs migrations at startup. This file lets
# a developer run e.g. `alembic revision --autogenerate -m "..."` locally.
#
# The database URL is intentionally left blank here; pass it on the CLI, e.g.:
#   alembic -x url=sqlite:///data/relay.db revision --autogenerate -m "msg"
# or set sqlalchemy.url before running. See env.py.

[alembic]
script_location = src/jackdaw/migrations
prepend_sys_path = src
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
