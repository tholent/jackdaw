services:
  jackdaw:
    image: ghcr.io/tholent/jackdaw:${JACKDAW_VERSION:-latest}
    # `build` lets `docker compose build` produce the image locally; deployments
    # can `docker compose pull` the published release instead.
    build: .
    ports:
      - "443:443"
    # The container runs as an unprivileged user (see Dockerfile).  Binding the
    # privileged :443 port therefore requires this one capability; everything
    # else stays dropped.
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      # Liveness listener on 127.0.0.1:8000 (see src/jackdaw/serve.py) — it
      # answers from process start, including while the first-boot Let's
      # Encrypt issuance still has the public HTTPS listener offline.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - DNS_PROVIDER=${DNS_PROVIDER:-porkbun}
      - PORKBUN_API_KEY=${PORKBUN_API_KEY}
      - PORKBUN_SECRET_API_KEY=${PORKBUN_SECRET_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - RELAY_DOMAIN=${RELAY_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - LE_DIRECTORY=${LE_DIRECTORY:-https://acme-v02.api.letsencrypt.org/directory}
      - DNS_PROPAGATION_WAIT=${DNS_PROPAGATION_WAIT:-30}
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=sqlite+aiosqlite:////data/relay.db
      - LE_VERIFY_SSL=${LE_VERIFY_SSL:-true}
      - CHALLENGE_HTTP_PORT=${CHALLENGE_HTTP_PORT:-80}
      - CHALLENGE_TIMEOUT=${CHALLENGE_TIMEOUT:-5}
      - CHALLENGE_RETRIES=${CHALLENGE_RETRIES:-3}
      - CHALLENGE_RETRY_DELAY=${CHALLENGE_RETRY_DELAY:-2}
      - NONCE_TTL=${NONCE_TTL:-600}
      - SSL_DIR=${SSL_DIR:-/data/ssl}
      - LE_ACCOUNT_KEY_PATH=${LE_ACCOUNT_KEY_PATH:-/data/le_account.key}
    volumes:
      - jackdaw-data:/data

volumes:
  jackdaw-data:
