services:
  init-certs:
    image: alpine/openssl
    volumes:
      - jackdaw-data:/data
      - ./nginx/bootstrap:/bootstrap:ro
    # alpine/openssl sets ENTRYPOINT ["openssl"], so override it to run the
    # bootstrap script through a shell instead of passing it to openssl.
    entrypoint: ["/bin/sh"]
    command: ["/bootstrap/generate-selfsigned.sh"]
    # Run to completion before nginx starts.

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - jackdaw-data:/data:ro
    depends_on:
      init-certs:
        condition: service_completed_successfully
      jackdaw:
        condition: service_healthy

  jackdaw:
    image: ghcr.io/tholent/jackdaw:${JACKDAW_VERSION:-latest}
    # `build` lets `docker compose build` produce the image locally; deployments
    # can `docker compose pull` the published release instead.
    build: .
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - DNS_PROVIDER=${DNS_PROVIDER:-porkbun}
      - PORKBUN_API_KEY=${PORKBUN_API_KEY}
      - PORKBUN_SECRET_API_KEY=${PORKBUN_SECRET_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - RELAY_DOMAIN=${RELAY_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - LE_DIRECTORY=${LE_DIRECTORY:-https://acme-v02.api.letsencrypt.org/directory}
      - DNS_PROPAGATION_WAIT=${DNS_PROPAGATION_WAIT:-30}
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=sqlite+aiosqlite:////data/relay.db
      - LE_VERIFY_SSL=${LE_VERIFY_SSL:-true}
      - CHALLENGE_HTTP_PORT=${CHALLENGE_HTTP_PORT:-80}
      - CHALLENGE_TIMEOUT=${CHALLENGE_TIMEOUT:-5}
      - CHALLENGE_RETRIES=${CHALLENGE_RETRIES:-3}
      - CHALLENGE_RETRY_DELAY=${CHALLENGE_RETRY_DELAY:-2}
      - NONCE_TTL=${NONCE_TTL:-600}
      - SSL_DIR=${SSL_DIR:-/data/ssl}
      - LE_ACCOUNT_KEY_PATH=${LE_ACCOUNT_KEY_PATH:-/data/le_account.key}
    volumes:
      - jackdaw-data:/data
    expose:
      - "8000"

volumes:
  jackdaw-data:
