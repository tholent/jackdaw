name: Mypy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  mypy:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Mypy — type check
        run: uv run mypy src/
