name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff — lint
        run: uv run ruff check src/ tests/

      - name: Ruff — format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy — type check
        run: uv run mypy src/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: pytest
        run: uv run pytest -v
        env:
          PORKBUN_API_KEY: pk1_test
          PORKBUN_SECRET_API_KEY: sk1_test

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t jackdaw:ci .
